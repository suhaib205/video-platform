<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>المنصة التعليمية</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100">

<div id="app"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, getDocs, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* 🔥 حط بيانات Firebase تبعك هون */
const firebaseConfig = {
  apiKey: "PUT_HERE",
  authDomain: "PUT_HERE",
  projectId: "PUT_HERE",
  storageBucket: "PUT_HERE",
  messagingSenderId: "PUT_HERE",
  appId: "PUT_HERE"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

await signInAnonymously(auth);

const appDiv = document.getElementById("app");

async function loadCourses() {
  const snapshot = await getDocs(collection(db, "courses"));
  let html = "<h1 class='text-3xl font-bold p-6'>الدورات</h1><div class='p-6 grid gap-4'>";
  snapshot.forEach(doc => {
    html += `<div class='bg-white p-4 rounded shadow'>${doc.data().title}</div>`;
  });
  html += "</div>";
  appDiv.innerHTML = html;
}

loadCourses();

</script>

</body>
</html>
